<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffc2e0"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="petal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </linearGradient>
  </defs>

  <!-- Arka plan yuvarlak kare -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Yapraklar (6 adet) -->
  <ellipse cx="256" cy="148" rx="52" ry="80" fill="url(#petal)" opacity="0.92"/>
  <ellipse cx="256" cy="148" rx="52" ry="80" fill="url(#petal)" opacity="0.92" transform="rotate(60 256 256)"/>
  <ellipse cx="256" cy="148" rx="52" ry="80" fill="url(#petal)" opacity="0.92" transform="rotate(120 256 256)"/>
  <ellipse cx="256" cy="148" rx="52" ry="80" fill="url(#petal)" opacity="0.92" transform="rotate(180 256 256)"/>
  <ellipse cx="256" cy="148" rx="52" ry="80" fill="url(#petal)" opacity="0.92" transform="rotate(240 256 256)"/>
  <ellipse cx="256" cy="148" rx="52" ry="80" fill="url(#petal)" opacity="0.92" transform="rotate(300 256 256)"/>

  <!-- Merkez daire -->
  <circle cx="256" cy="256" r="88" fill="#be185d"/>
  <circle cx="256" cy="256" r="78" fill="#f472b6"/>

  <!-- MN yazısı -->
  <text x="256" y="280" text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900" font-size="72" fill="#fff"
        letter-spacing="-2">MN</text>
</svg>
